openapi: 3.1.0
info:
  contact:
    email: support@consentshield.in
    name: ConsentShield Support
  description: |
    Bearer-authenticated compliance API for DPDP consent events, rights requests, audit logs, and data deletion. All endpoints require a `cs_live_*` API key issued from the ConsentShield dashboard.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: ConsentShield Compliance API
  version: 1.0.0
servers:
- description: Production
  url: https://api.consentshield.in/v1
- description: Production (legacy app-host path)
  url: https://app.consentshield.in/api/v1
security:
- bearerAuth: []
paths:
  /_ping:
    get:
      description: |
        Returns the resolved context for the authenticated key. Use this to verify your API key is valid, confirm scopes, and check the rate tier before calling data endpoints.
      operationId: ping
      responses:
        "200":
          content:
            application/json:
              example:
                ok: true
                org_id: 11111111-2222-3333-4444-555555555555
                account_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                scopes:
                - read:consent
                - write:consent
                - read:artefacts
                rate_tier: starter
              schema:
                $ref: '#/components/schemas/PingResponse'
          description: Key is valid and active.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "410":
          $ref: '#/components/responses/Gone'
        "429":
          $ref: '#/components/responses/TooManyRequests'
      summary: Canary health-check
      tags:
      - Utility
  /consent/verify:
    get:
      description: |
        DPDP §6 runtime check. Given a data principal identifier, property, and purpose code, returns whether consent is currently granted, revoked, expired, or never recorded. Identifier is hashed server-side with the org's per-org salt — plaintext is never stored.
      operationId: consentVerify
      parameters:
      - explode: true
        in: query
        name: property_id
        required: true
        schema:
          format: uuid
          type: string
        style: form
      - description: "Caller's identifier for the data principal (email, phone, PAN,\
          \ etc.). Hashed server-side; never stored."
        explode: true
        in: query
        name: data_principal_identifier
        required: true
        schema:
          type: string
        style: form
      - description: "Determines normalisation rule: email=trim+lowercase; phone/aadhaar=digits\
          \ only; pan=trim+uppercase; custom=trim. Callers MUST use the same type\
          \ at record-time and verify-time."
        explode: true
        in: query
        name: identifier_type
        required: true
        schema:
          enum:
          - email
          - phone
          - pan
          - aadhaar
          - custom
          type: string
        style: form
      - explode: true
        in: query
        name: purpose_code
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                identifier_type: email
                purpose_code: marketing
                status: granted
                active_artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                revoked_at: null
                revocation_record_id: null
                expires_at: 2027-03-14T08:12:00Z
                evaluated_at: 2026-04-21T10:15:33Z
              schema:
                $ref: '#/components/schemas/VerifyResponse'
          description: Verification envelope.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks the read:consent scope.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: property_id does not belong to the key's org.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Missing query param / empty identifier / unknown identifier_type.
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:consent
      summary: Single-identifier consent verification
      tags:
      - Consent
  /consent/artefacts:
    get:
      description: |
        Returns artefacts for the key's org with keyset pagination and optional filters. `data_principal_identifier` + `identifier_type` must be supplied together to filter by identity.
      operationId: consentArtefactsList
      parameters:
      - explode: true
        in: query
        name: property_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: data_principal_identifier
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: identifier_type
        required: false
        schema:
          enum:
          - email
          - phone
          - pan
          - aadhaar
          - custom
          type: string
        style: form
      - explode: true
        in: query
        name: status
        required: false
        schema:
          enum:
          - active
          - revoked
          - expired
          - replaced
          type: string
        style: form
      - explode: true
        in: query
        name: purpose_code
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: expires_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: expires_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                  property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                  purpose_code: marketing
                  purpose_definition_id: 7f4b3b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                  data_scope:
                  - email_address
                  - phone_number
                  framework: dpdp
                  status: active
                  expires_at: 2027-03-14T08:12:00Z
                  revoked_at: null
                  revocation_record_id: null
                  replaced_by: null
                  identifier_type: email
                  created_at: 2026-04-21T10:15:03Z
                next_cursor: null
              schema:
                $ref: '#/components/schemas/ArtefactListResponse'
          description: Paged list envelope.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks read:artefacts scope.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Invalid filter combination, bad cursor, malformed identifier,\
            \ or bad limit/date."
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:artefacts
      summary: List consent artefacts (cursor-paginated)
      tags:
      - Consent
  /consent/artefacts/{id}:
    get:
      description: |
        Returns the artefact envelope + revocation record (if any) + full replacement chain in chronological order.
      operationId: consentArtefactGet
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              example:
                artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                purpose_code: marketing
                purpose_definition_id: 7f4b3b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                data_scope:
                - email_address
                - phone_number
                framework: dpdp
                status: active
                expires_at: 2027-03-14T08:12:00Z
                revoked_at: null
                revocation_record_id: null
                replaced_by: null
                identifier_type: email
                created_at: 2026-04-21T10:15:03Z
                revocation: null
                replacement_chain:
                - art_01J5TZ8XQKVPKPYH7PZCTMFMH8
              schema:
                $ref: '#/components/schemas/ArtefactDetail'
          description: Artefact detail.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks read:artefacts scope.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: No artefact with that id belongs to the key's org.
        "410":
          $ref: '#/components/responses/Gone'
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:artefacts
      summary: Get a single consent artefact
      tags:
      - Consent
  /consent/artefacts/{id}/revoke:
    post:
      description: |
        Records a revocation event for the artefact. The ADR-0022 cascade trigger flips consent_artefacts.status to `revoked` and updates the consent_artefact_index. Idempotent — calling revoke on an already- revoked artefact returns 200 with the existing revocation_record_id. Terminal states (`expired`, `replaced`) cannot be revoked and return 409.
      operationId: consentArtefactRevoke
      parameters:
      - explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            example:
              reason_code: user_withdrawal
              reason_notes: User requested unsubscribe via email
              actor_type: user
              actor_ref: alice@example.com
            schema:
              $ref: '#/components/schemas/RevokeRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              example:
                artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                status: revoked
                revocation_record_id: 6c9d0e1f-2a3b-4c5d-6e7f-8a9b0c1d2e3f
                idempotent_replay: false
              schema:
                $ref: '#/components/schemas/RevokeResponse'
          description: Revoked (new or idempotent replay).
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks write:artefacts scope.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: No artefact with that id belongs to the key's org.
        "409":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Artefact is in a terminal state (expired or replaced) and cannot
            be revoked.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Missing reason_code, malformed body, or unknown actor_type."
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - write:artefacts
      summary: Revoke a consent artefact
      tags:
      - Consent
  /consent/events:
    get:
      description: |
        Returns paginated summaries (counts, not full payloads) of consent_events rows. Use for §11 audit timelines.
      operationId: consentEventsList
      parameters:
      - explode: true
        in: query
        name: property_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: created_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: created_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: source
        required: false
        schema:
          enum:
          - web
          - api
          - sdk
          type: string
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 5b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e
                  property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                  source: api
                  event_type: consent_granted
                  purposes_accepted_count: 2
                  purposes_rejected_count: 0
                  identifier_type: email
                  artefact_count: 2
                  created_at: 2026-04-21T10:15:03Z
                next_cursor: eyJjcmVhdGVkX2F0IjoiMjAyNi0wNC0yMVQxMDoxNTowM1oifQ
              schema:
                $ref: '#/components/schemas/EventListResponse'
          description: Paged event list envelope.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks read:consent scope.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Bad cursor, limit, date, or source."
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:consent
      summary: "List consent events (summary only, cursor-paginated)"
      tags:
      - Consent
  /deletion/trigger:
    post:
      description: |
        Inserts `artefact_revocations` rows for every active artefact matching the scope. The ADR-0022 cascade + process-artefact-revocation Edge Function then create `deletion_receipts` asynchronously. `retention_expired` mode is not yet implemented (returns 501).
      operationId: deletionTrigger
      requestBody:
        content:
          application/json:
            example:
              property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
              data_principal_identifier: alice@example.com
              identifier_type: email
              reason: erasure_request
              actor_type: user
              actor_ref: alice@example.com
            schema:
              $ref: '#/components/schemas/DeletionTriggerRequest'
        required: true
      responses:
        "202":
          content:
            application/json:
              example:
                reason: erasure_request
                revoked_artefact_ids:
                - art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                - art_01J5TZ9AKVPKPYH7PZCTMFMH8
                revoked_count: 2
                initial_status: pending
                note: Deletion receipts will be generated asynchronously by the orchestrator.
              schema:
                $ref: '#/components/schemas/DeletionTriggerResponse'
          description: Revocations inserted; deletion_receipts are being created asynchronously.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks write:deletion scope.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: property_id does not belong to the key's org.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Invalid body, missing purpose_codes for consent_revoked, or\
            \ unknown reason/actor_type/identifier."
        "429":
          $ref: '#/components/responses/TooManyRequests'
        "501":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: retention_expired mode is not yet implemented.
      security:
      - bearerAuth:
        - write:deletion
      summary: Trigger deletion orchestration for a data principal
      tags:
      - Deletion
  /integrations/{connector_id}/test_delete:
    post:
      description: |
        Creates a synthetic deletion request against the named connector. Generates a random `cs_test_principal_<uuid>` data_principal and writes a `deletion_receipts` row with `trigger_type='test_delete'` and `request_payload.is_test=true`. Customer handlers should inspect `request_payload.reason=='test'` and short-circuit without deleting real data.
        Rate-limited to 10 calls per connector per hour. Test rows have `artefact_id=null` so compliance aggregations exclude them.
      operationId: integrationsTestDelete
      parameters:
      - explode: false
        in: path
        name: connector_id
        required: true
        schema:
          format: uuid
          type: string
        style: simple
      responses:
        "202":
          content:
            application/json:
              example:
                receipt_id: 9d8e7f6a-5b4c-3d2e-1f0a-9b8c7d6e5f4a
                data_principal_identifier: cs_test_principal_5fa8c1b2-3d4e-4a7b-9c0d-ef1234567890
                reason: test
                connector_id: 8e9f0a1b-2c3d-4e5f-6a7b-8c9d0e1f2a3b
                connector_type: hubspot
                status: pending
                note: Customer webhook handler should inspect request_payload->>'reason'='test'
                  and short-circuit without deleting real data.
              schema:
                $ref: '#/components/schemas/TestDeleteResponse'
          description: Test deletion receipt created; delivery is async.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks write:deletion scope or does not authorise
            the org.
        "404":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: connector_id does not belong to the key's org.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: connector_id malformed or connector is not active.
        "429":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Rate limit — 10 test_delete calls per connector per hour.
      security:
      - bearerAuth:
        - write:deletion
      summary: Exercise a customer deletion-webhook handler without real data
      tags:
      - Deletion
  /deletion/receipts:
    get:
      description: |
        Cursor-paginated list with filters on status, connector, source artefact_id, and issue date range.
      operationId: deletionReceiptsList
      parameters:
      - explode: true
        in: query
        name: status
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: connector_id
        required: false
        schema:
          format: uuid
          type: string
        style: form
      - explode: true
        in: query
        name: artefact_id
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: issued_after
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: issued_before
        required: false
        schema:
          format: date-time
          type: string
        style: form
      - explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 50
          maximum: 200
          minimum: 1
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              example:
                items:
                - id: 7d8e9f0a-1b2c-3d4e-5f6a-7b8c9d0e1f2a
                  trigger_type: erasure_request
                  trigger_id: 5b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e
                  artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                  connector_id: 8e9f0a1b-2c3d-4e5f-6a7b-8c9d0e1f2a3b
                  target_system: hubspot
                  status: confirmed
                  retry_count: 0
                  failure_reason: null
                  requested_at: 2026-04-21T10:15:05Z
                  confirmed_at: 2026-04-21T10:15:42Z
                  created_at: 2026-04-21T10:15:03Z
                next_cursor: null
              schema:
                $ref: '#/components/schemas/DeletionReceiptsResponse'
          description: Paged list envelope.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: Key is valid but lacks read:deletion scope.
        "410":
          $ref: '#/components/responses/Gone'
        "422":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Bad cursor, limit, or date."
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:deletion
      summary: List deletion receipts
      tags:
      - Deletion
  /consent/record:
    post:
      description: |
        Records a consent event captured outside the browser (mobile app, call-centre, branch, kiosk, in-person) and issues one artefact per granted purpose. Use client_request_id for safe retries.
      operationId: consentRecord
      requestBody:
        content:
          application/json:
            example:
              property_id: 3a4b8b21-5a11-4f37-9b7c-6f2e0d5c8b1a
              data_principal_identifier: alice@example.com
              identifier_type: email
              purpose_definition_ids:
              - 7f4b3b21-5a11-4f37-9b7c-6f2e0d5c8b1a
              - 9e2c8a0c-1d8a-4a2c-a4bf-2b0e6b1f3c9d
              captured_at: 2026-04-21T10:14:55Z
              client_request_id: req_01J5TZ8XQKVPKPYH7PZCTMFMH8
            schema:
              $ref: '#/components/schemas/RecordRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              example:
                event_id: 5b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e
                created_at: 2026-04-21T10:15:03Z
                artefact_ids:
                - purpose_definition_id: 7f4b3b21-5a11-4f37-9b7c-6f2e0d5c8b1a
                  purpose_code: marketing
                  artefact_id: art_01J5TZ8XQKVPKPYH7PZCTMFMH8
                  status: active
                - purpose_definition_id: 9e2c8a0c-1d8a-4a2c-a4bf-2b0e6b1f3c9d
                  purpose_code: analytics
                  artefact_id: art_01J5TZ9AKVPKPYH7PZCTMFMH8
                  status: active
                idempotent_replay: false
              schema:
                $ref: '#/components/schemas/RecordResponse'
          description: Consent recorded; artefacts created.
        "200":
          content:
            application/json:
              example:
                event_id: 5b8c9d0e-1f2a-3b4c-5d6e-7f8a9b0c1d2e
                created_at: 2026-04-21T10:15:03Z
                artefact_ids:
