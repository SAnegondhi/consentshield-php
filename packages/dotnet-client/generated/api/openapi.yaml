      security:
      - bearerAuth:
        - read:security
      summary: List recent security-posture scan findings
      tags:
      - Security
  /score:
    get:
      description: |
        Reads the cached DEPA score from `public.depa_compliance_metrics` (ADR-0025). Refreshed nightly by pg_cron; `computed_at` shows freshness. All four dimension scores are on a 0..5 scale; `total_score` = sum on a 0..20 scale. `max_score` is a fixed constant (20) to make ratio arithmetic easy.
        If the nightly refresh has not yet run for this org, every score field is `null`, `computed_at` is `null`, and `max_score` is still `20`. Clients should treat a null `total_score` as "no data yet" rather than 0.
        Requires an org-scoped API key; account-scoped keys get 400.
      operationId: scoreSelf
      responses:
        "200":
          content:
            application/json:
              example:
                total_score: 16.5
                coverage_score: 5.0
                expiry_score: 4.0
                freshness_score: 4.5
                revocation_score: 3.0
                computed_at: 2026-04-22T19:30:04Z
                max_score: 20
              schema:
                $ref: '#/components/schemas/DepaScoreResponse'
          description: Current score envelope.
        "400":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: API key is account-scoped; this endpoint requires an org-scoped
            key.
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/Problem'
          description: "Missing `read:score` scope, or API key is not authorised for\
            \ this organisation."
        "410":
          $ref: '#/components/responses/Gone'
        "429":
          $ref: '#/components/responses/TooManyRequests'
      security:
      - bearerAuth:
        - read:score
      summary: Current DEPA compliance score for the caller's org
      tags:
      - Score
